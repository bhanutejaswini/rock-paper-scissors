<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors Game</title>

    <!-- Font Awesome Link -->
    <script
      src="https://kit.fontawesome.com/44d53da720.js"
      crossorigin="anonymous"
    ></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Rock Paper Scissors</h1>
    </header>

    <main>
      <div id="score-board">
        <div id="computer-label" class="score-label">computer</div>
        <div id="user-label" class="score-label">user</div>
        <h3 id="score">
          <span id="computer-score">0</span> : <span id="user-score">0</span>
        </h3>
      </div>

      <div id="choices">
        <div id="computer-choice" class="choice"></div>
        <div id="user-choice" class="choice"></div>
      </div>

      <h2 id="result"></h2>

      <div id="user-choice-container">
        <div id="rock" class="user-choice">
          <i class="fa fa-solid fa-hand-back-fist"></i>
        </div>
        <div id="paper" class="user-choice">
          <i class="fas fa-hand"></i>
        </div>
        <div id="scissors" class="user-choice">
          <i class="fa fa-solid fa-hand-scissors"></i>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
